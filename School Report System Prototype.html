<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Report Page</title>
  <style>
    /* Basic page colors. */
    :root {
      --page: #eef2f7;
      --panel: #ffffff;
      --text: #172033;
      --muted: #5b6472;
      --border: #c7d0df;
      --primary: #1f4f8f;
      --danger: #a61b1b;
      --success: #166534;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: var(--page);
      color: var(--text);
    }

    /* Top title area. */
    .page-header {
      background: var(--primary);
      color: white;
      padding: 22px;
    }

    .page-header p {
      color: #dbeafe;
      margin-bottom: 0;
    }

    main {
      max-width: 720px;
      margin: 22px auto;
      padding: 0 18px;
    }

    /* Main form box. */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 20px;
    }

    h1,
    p {
      margin-top: 0;
    }

    label,
    input,
    select,
    textarea,
    button {
      display: block;
      margin-top: 10px;
    }

    input,
    select,
    textarea {
      width: 100%;
      max-width: 480px;
      padding: 8px;
      border: 1px solid var(--border);
      font-size: 15px;
    }

    textarea {
      min-height: 90px;
    }

    button {
      padding: 9px 13px;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: white;
      cursor: pointer;
    }

    /* Form message area. */
    .message {
      display: none;
      margin-top: 12px;
      padding: 8px;
      border: 1px solid var(--border);
      max-width: 480px;
    }

    #errorMessage {
      color: var(--danger);
    }

    #successMessage {
      color: var(--success);
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>Student Report Page</h1>
    <p>Use this page to report damaged or unsafe school facilities.</p>
  </header>

  <main>
    <section class="panel">
      <p id="errorMessage" class="message">Please complete all fields.</p>
      <p id="successMessage" class="message">Report saved to the database.</p>

      <!-- Student page only sends new reports. -->
      <form id="reportForm">
        <label for="studentName">Student name</label>
        <input id="studentName" type="text" placeholder="Example: Xukun Cai" />

        <label for="location">Location</label>
        <select id="location">
          <option value="">Select location</option>
          <option>Cafe</option>
          <option>Ken Havill Centre for Learning</option>
          <option>Turf Court</option>
          <option>Y Block</option>
          <option>PH Block</option>
          <option>Te Whakamanu</option>
          <option>Gym</option>
          <option>Toilets</option>
          <option>WSCW Northern Fields</option>
          <option>Waiora</option>
          <option>Waioteao</option>
          <option>Te Rehu</option>
          <option>Nga Oho</option>
          <option>Hall</option>
          <option>WSC Admin</option>
          <option>Te Wharau</option>
          <option>Whare Puoro</option>
          <option>TAPAC</option>
        </select>

        <label for="issueType">Issue type</label>
        <select id="issueType">
          <option value="">Select issue type</option>
          <option>Broken furniture</option>
          <option>Damaged wall</option>
          <option>Broken window</option>
          <option>Unsafe floor</option>
          <option>Water leak</option>
          <option>Lights or power</option>
          <option>Door or lock problem</option>
          <option>Other</option>
        </select>

        <label for="priority">Priority</label>
        <select id="priority">
          <option value="">Select priority</option>
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>

        <label for="description">Description</label>
        <textarea id="description" placeholder="Example: A chair leg is loose in Y Block near Room Y12."></textarea>

        <button type="submit">Submit Report</button>
      </form>
    </section>
  </main>

  <script>
    // Get page elements.
    const reportForm = document.getElementById("reportForm");
    const errorMessage = document.getElementById("errorMessage");
    const successMessage = document.getElementById("successMessage");

    // Show an error message.
    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = "block";
      successMessage.style.display = "none";
    }

    // Show the success message.
    function showSuccess() {
      errorMessage.style.display = "none";
      successMessage.style.display = "block";
    }

    // Read the server error message.
    async function getErrorMessage(response, fallbackMessage) {
      try {
        const data = await response.json();
        return data.error || fallbackMessage;
      } catch (error) {
        return fallbackMessage;
      }
    }

    // Send student report data to the database API.
    reportForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const report = {
        studentName: document.getElementById("studentName").value.trim(),
        location: document.getElementById("location").value,
        issueType: document.getElementById("issueType").value,
        priority: document.getElementById("priority").value,
        description: document.getElementById("description").value.trim()
      };

      if (!report.studentName || !report.location || !report.issueType || !report.priority || !report.description) {
        showError("Please complete all fields.");
        return;
      }

      try {
        const response = await fetch("/api/reports", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(report)
        });

        if (!response.ok) {
          showError(await getErrorMessage(response, "The report could not be saved."));
          return;
        }

        reportForm.reset();
        showSuccess();
      } catch (error) {
        showError("Could not connect to the server. Open the page from http://127.0.0.1:8000/student.");
      }
    });
  </script>
</body>
</html>
